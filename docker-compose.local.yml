services:
  db:
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"

  web:
    ports:
      - "127.0.0.1:${WEB_PORT:-8010}:8000"
    environment:
      DEPLOY_ENV: local
      DEBUG: "True"
      DB_HOST: db
      CHAT_REALTIME_ENABLED: "False"
      CHANNEL_LAYER_BACKEND: memory

  redis:
    profiles: ["disabled-local"]

  proxy:
    profiles: ["disabled-local"]
