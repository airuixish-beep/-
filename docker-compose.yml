services:
  db:
    image: mysql:8.0
    container_name: xuanor_site_db
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      MYSQL_DATABASE: ${DB_NAME:?Set DB_NAME via .env or --env-file}
      MYSQL_USER: ${DB_USER:?Set DB_USER via .env or --env-file}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD via .env or --env-file}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD via .env or --env-file}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: xuanor_site_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["realtime"]

  web:
    build:
      context: .
    container_name: xuanor_site_web
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/ready', timeout=3).read()"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: xuanor_site_proxy
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1/healthz/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  mysql_data:
  media_data:
  redis_data:
  static_data:
