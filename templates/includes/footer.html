    <div>
      <p class="tracking-[0.35em] text-xuanor-cream">X U A N O R</p>
      <p class="mt-3 max-w-md text-sm leading-6 text-xuanor-muted">
        {% if site_config and site_config.footer_text %}
          {{ site_config.footer_text }}

          Quiet symbols for modern life.
        {% endif %}
      </p>
    </div>

    <div class="text-sm text-xuanor-muted">
      <div class="flex flex-wrap gap-4">

        <a href="{% url 'pages:shipping_policy' %}" class="hover:text-xuanor-gold">发货政策</a>
        <a href="{% url 'pages:privacy_policy' %}" class="hover:text-xuanor-gold">隐私政策</a>
        <a href="{% url 'pages:terms_of_service' %}" class="hover:text-xuanor-gold">服务条款</a>
        <a href="/admin/" class="hover:text-xuanor-gold">后台</a>

      <p class="mt-3">© {% now "Y" %} {% if site_config %}{{ site_config.site_name }}{% else %}XUANOR{% endif %}</p>
