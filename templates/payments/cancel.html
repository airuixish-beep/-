{% extends 'base.html' %}

{% block title %}支付已取消 | XUANOR{% endblock %}

{% block content %}
<section class="border-b border-white/10">
  <div class="mx-auto max-w-3xl px-6 py-20 text-center lg:px-10">
    <p class="text-xs uppercase tracking-[0.35em] text-xuanor-gold">Payment</p>
    <h1 class="mt-3 text-4xl text-xuanor-cream md:text-5xl">支付已取消</h1>
    <p class="mt-6 text-base leading-8 text-xuanor-muted">订单 {{ order.order_number }} 尚未完成支付，你可以稍后重新下单。</p>
    <div class="mt-8 flex flex-wrap justify-center gap-4">
      <a href="/products/" class="rounded-full border border-xuanor-gold bg-xuanor-gold px-6 py-3 text-sm text-black hover:opacity-90">返回产品目录</a>
      <a href="/orders/lookup/" class="rounded-full border border-white/15 px-6 py-3 text-sm text-xuanor-cream hover:border-xuanor-gold hover:text-xuanor-gold">查询订单</a>
    </div>
  </div>
</section>
{% endblock %}
