<section class="module">
  {% if title or description or actions %}
  <div class="x-admin-panel-header">
    <div class="x-admin-panel-title-group">
      {% if title %}<h2 class="x-admin-panel-title">{{ title }}</h2>{% endif %}
      {% if description %}<p class="x-admin-panel-copy">{{ description }}</p>{% endif %}
    </div>
    {% if actions %}
    <div class="panel-actions">
      {% for action in actions %}
      <a href="{{ action.url }}" class="x-admin-panel-action{% if action.primary %} is-primary{% endif %}">{{ action.label }}</a>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  {% endif %}
  {{ body }}
</section>
